body:
  text: 補饗禮禮類二儀禮之屬提要臣等謹案補饗禮一卷國朝諸錦輯錦字襄七號草廬秀水人雍正甲辰進士改庶吉士散館授知縣乾隆丙辰召試博學鴻詞授翰林院編修官至左春坊左贊善錦以儀禮十七篇有燕禮有公食大夫禮而獨無饗禮然其見于周官春秋傳戴記者猶可得而考見元吳澄作纂言及考注嘗有補經八篇補傳十五篇獨于饗禮之文未有特著葢縁第八第十聘覲篇中俱兼及饗食謂其可以相通而略之殊不知饗之為禮也大非一聘所能該有祭帝祫祭之大饗復有天子享元侯兩君相見及凡享賓客之不同使不自為一篇則雖諸書可考亦無自而察其全因據周官賔客之禮聨事而比次之并取左傳戴記中相發明者條注于其下為補饗禮一卷葢是編以周官為宗周禮固儀禮綱領以經補經固無訾于不類至其分注之傳記證佐天然咸有條理尤非牽强附㑹之比至薦籩不薦籩之異文庭燎門燎掌于閽人甸人之殊説並兩存其義不生穿鑿亦勝于空談意勝之學焉雖寥寥不足二十葉而古典所存足資考證未可以其篇帙之少而廢之也乾隆四十四年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d973d33719a69df5fddf08f01bd6430a6c4475030a0b4023de68cf140b14d9d7
